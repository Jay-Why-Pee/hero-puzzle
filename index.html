<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Hero Rescue Infinity</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #444; }
    </style>
</head>
<body>
<script>
// --- 안정적인 이미지 데이터 ---
const ASSETS = {
    hero: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAP0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA8G8AsEAAAU9967QAAAAASUVORK5CYII=', // 임시 더미
    pin: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAAAKCAYAAAD8698UAAAAN0lEQVRYhe3BMQEAAADCoPVPbQwfoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAICvAQU0AAEt76S3AAAAAElFTkcyV0J'
};

const config = {
    type: Phaser.AUTO,
    width: 400,
    height: 600,
    backgroundColor: '#2c3e50',
    physics: { 
        default: 'matter', 
        matter: { gravity: { y: 1 }, debug: true } // 디버그 모드 켬 (초록색 선이 보임)
    },
    scene: { preload: preload, create: create, update: update }
};

let hero;
let score = 0;
let scoreText;

const game = new Phaser.Game(config);

function preload() {
    // 도형으로 에셋을 대체하여 에러 방지
}

function create() {
    scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '20px', fill: '#fff' }).setDepth(10);

    // 1. 바닥 생성
    this.matter.add.rectangle(200, 550, 400, 40, { isStatic: true });

    // 2. 히어로 생성 (노란색 사각형)
    hero = this.add.rectangle(200, 450, 40, 60, 0xffff00);
    this.matter.add.gameObject(hero);
    hero.body.label = 'hero';

    // 3. 핀 생성 (빨간색 막대)
    createPin.call(this, 200, 350);

    // 4. 보물 생성 (금색 동그라미들)
    for(let i=0; i<10; i++) {
        let gold = this.add.circle(150 + (i*10), 200, 8, 0xffd700);
        this.matter.add.gameObject(gold, { shape: 'circle', restitution: 0.5 });
    }

    // 마우스 클릭 시 핀 제거
    this.input.on('gameobjectdown', (pointer, gameObject) => {
        if(gameObject.isPin) {
            gameObject.destroy();
        }
    });

    this.add.text(60, 100, '핀(빨간색)을 클릭하세요!', { fill: '#ffffff' });
}

function update() {
    // 무한 루프나 로직 에러 방지를 위해 비워둠
}

function createPin(x, y) {
    let pin = this.add.rectangle(x, y, 300, 10, 0xff0000);
    this.matter.add.gameObject(pin, { isStatic: true });
    pin.setInteractive();
    pin.isPin = true;
    return pin;
}
</script>
</body>
</html>
