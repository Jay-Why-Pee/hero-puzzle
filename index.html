<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Hero Rescue: Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 5px solid #3d2511; border-radius: 10px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 450,
    height: 800,
    physics: { default: 'matter', matter: { gravity: { y: 1.5 }, debug: false } },
    scene: { preload: preload, create: create }
};

const game = new Phaser.Game(config);

function preload() {
    // 1단계에서 다운로드한 이미지 파일들을 로드합니다.
    this.load.image('hero', 'hero.png');
    this.load.image('gold', 'gold.png');
    this.load.image('lava', 'lava.png');
    this.load.image('wall', 'wall.png');
    this.load.image('pin', 'pin.png');
}

function create() {
    // 배경색 설정 (어두운 던전 느낌)
    this.cameras.main.setBackgroundColor('#1a1005');

    // 1. 캐릭터 생성
    const hero = this.matter.add.sprite(225, 700, 'hero').setFixedRotation().setScale(0.8);

    // 2. 핀 생성 (가로, 세로, 대각선 모두 가능)
    const pin1 = this.matter.add.image(225, 400, 'pin', null, { isStatic: true });
    pin1.setInteractive().isPin = true;
    pin1.setAngle(0); // 가로 핀

    const pin2 = this.matter.add.image(100, 300, 'pin', null, { isStatic: true });
    pin2.setInteractive().isPin = true;
    pin2.setAngle(90); // 세로 핀

    // 3. 보물 및 용암 생성
    // 금화 더미
    for(let i=0; i<15; i++) {
        this.matter.add.image(180 + Math.random()*80, 200, 'gold').setCircle(15);
    }

    // 용암
    let lava = this.matter.add.image(225, 100, 'lava', null, { isStatic: false }).setScale(3, 1);

    // 4. 벽 생성
    // 바닥
    this.matter.add.image(225, 780, 'wall', null, { isStatic: true }).setScale(7, 0.5);
    // 왼쪽 벽, 오른쪽 벽
    this.matter.add.image(50, 400, 'wall', null, { isStatic: true }).setScale(1, 12);
    this.matter.add.image(400, 400, 'wall', null, { isStatic: true }).setScale(1, 12);

    // 핀 제거 클릭 이벤트
    this.input.on('gameobjectdown', (pointer, gameObject) => {
        if(gameObject.isPin) {
            this.tweens.add({
                targets: gameObject,
                alpha: 0,
                x: gameObject.x - 400,
                duration: 500,
                onComplete: () => { gameObject.destroy(); }
            });
        }
    });

    this.add.text(10, 10, "고퀄리티 이미지 적용 버전", { fill: '#fff' });
}
</script>
</body>
</html>
