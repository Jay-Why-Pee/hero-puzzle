<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Color Drop Puzzle - Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #555; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 450,
    height: 700,
    backgroundColor: '#1a1a2e',
    physics: {
        default: 'matter',
        matter: { gravity: { y: 1 }, debug: false } // 물리 엔진 활성화
    },
    scene: { create: create }
};

const game = new Phaser.Game(config);

function create() {
    // --- 1. 고퀄리티 텍스처 코드 생성기 ---
    const graphics = this.make.graphics({ x: 0, y: 0, add: false });
    
    // 유색 공 (빨간색 광택)
    graphics.fillStyle(0xff3333, 1); graphics.fillCircle(12, 12, 12);
    graphics.fillStyle(0xffffff, 0.6); graphics.fillCircle(8, 8, 4); // 하이라이트
    graphics.generateTexture('ball_colored', 24, 24);
    graphics.clear();

    // 무색 공 (회색 광택)
    graphics.fillStyle(0xcccccc, 1); graphics.fillCircle(12, 12, 12);
    graphics.fillStyle(0xffffff, 0.8); graphics.fillCircle(8, 8, 4);
    graphics.generateTexture('ball_white', 24, 24);
    graphics.clear();

    // 폭탄 (검은색 + 빨간 심지)
    graphics.fillStyle(0x222222, 1); graphics.fillCircle(15, 15, 15);
    graphics.fillStyle(0xff0000, 1); graphics.fillCircle(15, 15, 5); // 위험 표시
    graphics.generateTexture('bomb', 30, 30);
    graphics.clear();

    // 핀 (금색 막대)
    graphics.fillStyle(0xffd700, 1); graphics.fillRect(0, 0, 250, 10);
    graphics.fillStyle(0xb8860b, 1); graphics.fillCircle(250, 5, 12); // 손잡이
    graphics.generateTexture('pin', 270, 20);
    
    // 유리벽 (반투명 파란색)
    graphics.clear();
    graphics.fillStyle(0x4488ff, 0.4); graphics.lineStyle(2, 0x88bbff, 1);
    graphics.fillRect(0, 0, 20, 200); graphics.strokeRect(0, 0, 20, 200);
    graphics.generateTexture('glass', 20, 200);

    // --- 2. 레벨 구조 배치 (Level 2 스타일: Y자 구조) ---
    // 용기 (하단)
    this.matter.add.rectangle(150, 650, 20, 100, { isStatic: true }); // 왼쪽 벽
    this.matter.add.rectangle(300, 650, 20, 100, { isStatic: true }); // 오른쪽 벽
    this.matter.add.rectangle(225, 700, 150, 20, { isStatic: true }); // 바닥

    // 유리 경사로
    this.matter.add.image(100, 400, 'glass', null, { isStatic: true }).setAngle(-30); // 왼쪽 경사
    this.matter.add.image(350, 400, 'glass', null, { isStatic: true }).setAngle(30);  // 오른쪽 경사

    // 핀 A (왼쪽: 유색 공 막기)
    let pinA = this.matter.add.image(150, 250, 'pin', null, { isStatic: true }).setInteractive();
    pinA.isPin = true;

    // 핀 B (오른쪽: 폭탄 막기)
    let pinB = this.matter.add.image(350, 250, 'pin', null, { isStatic: true }).setAngle(180).setInteractive();
    pinB.isPin = true;

    // 핀 C (중앙: 섞인 공 막기)
    let pinC = this.matter.add.image(225, 500, 'pin', null, { isStatic: true }).setInteractive();
    pinC.isPin = true;

    // 오브젝트 생성 (공과 폭탄)
    let balls = [];
    
    // 왼쪽: 유색 공 10개
    for(let i=0; i<10; i++) {
        let b = this.matter.add.image(100 + Math.random()*20, 150 - i*20, 'ball_colored').setCircle(12, { restitution: 0.5 });
        b.body.label = 'colored'; // 라벨링 중요!
        balls.push(b);
    }

    // 중앙: 무색 공 15개
    for(let i=0; i<15; i++) {
        let b = this.matter.add.image(225 + Math.random()*20, 400 - i*20, 'ball_white').setCircle(12, { restitution: 0.5 });
        b.body.label = 'white';
        balls.push(b);
    }

    // 오른쪽: 폭탄 1개
    let bomb = this.matter.add.image(350, 200, 'bomb').setCircle(15, { restitution: 0.2 });
    bomb.body.label = 'bomb';

    // --- 3. 핵심 상호작용 로직 (물리 충돌 이벤트) ---
    this.matter.world.on('collisionstart', (event) => {
        event.pairs.forEach((pair) => {
            const bodyA = pair.bodyA;
            const bodyB = pair.bodyB;

            // [메커니즘 1] 전염(색칠) 로직: 유색 공과 무색 공이 만났을 때
            if ((bodyA.label === 'colored' && bodyB.label === 'white') || 
                (bodyB.label === 'colored' && bodyA.label === 'white')) {
                
                let whiteBody = bodyA.label === 'white' ? bodyA : bodyB;
                
                // 무색 공을 유색 공으로 속성 변경
                whiteBody.label = 'colored';
                whiteBody.gameObject.setTexture('ball_colored');
            }

            // [메커니즘 2] 폭발 로직: 폭탄이 무언가(공 등)와 닿았을 때
            if (bodyA.label === 'bomb' || bodyB.label === 'bomb') {
                let bombBody = bodyA.label === 'bomb' ? bodyA : bodyB;
                
                if (bombBody.gameObject.active) {
                    explode(bombBody.position.x, bombBody.position.y);
                    bombBody.gameObject.destroy(); // 폭탄 제거
                }
            }
        });
    });

    // 폭발 함수 (주변 오브젝트에 척력/충격량 적용)
    const explode = (x, y) => {
        // 폭발 시각 효과 (빨간 원이 커지며 사라짐)
        let blast = this.add.circle(x, y, 10, 0xffaa00, 0.8);
        this.tweens.add({ targets: blast, radius: 100, alpha: 0, duration: 300, onComplete: () => blast.destroy() });

        // 물리적 밀어내기 효과
        let allBodies = this.matter.world.getAllBodies();
        allBodies.forEach(b => {
            if (b.gameObject && (b.label === 'colored' || b.label === 'white')) {
                let distance = Phaser.Math.Distance.Between(x, y, b.position.x, b.position.y);
                if (distance < 120) { // 폭발 반경
                    // 중심에서 멀어지는 방향으로 강한 힘(Force) 적용
                    let forceX = (b.position.x - x) * 0.0005;
                    let forceY = (b.position.y - y) * 0.0005;
                    this.matter.body.applyForce(b, b.position, { x: forceX, y: forceY });
                }
            }
        });
        
        // 화면 흔들림 효과 (Camera Shake)
        this.cameras.main.shake(200, 0.02);
    };

    // --- 4. 핀 뽑기(클릭) 이벤트 ---
    this.input.on('gameobjectdown', (pointer, gameObject) => {
        if (gameObject.isPin) {
            this.tweens.add({
                targets: gameObject,
                x: gameObject.x + (gameObject.angle === 0 ? 300 : -300), // 각도에 따라 뽑히는 방향 다르게
                alpha: 0,
                duration: 300,
                onComplete: () => {
                    this.matter.world.remove(gameObject.body);
                    gameObject.destroy();
                }
            });
        }
    });

    // 안내 문구
    this.add.text(10, 10, "1. 왼쪽 핀을 먼저 뽑아 색을 섞으세요.\n2. 폭탄을 조심하세요!", { fill: '#fff', fontSize: '14px' });
}
</script>
</body>
</html>
